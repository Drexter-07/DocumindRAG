version: '3.8'

services:
  # 1. The Database (Postgres + pgvector)
  db:
    image: pgvector/pgvector:pg16  # Specialized image with vector support pre-installed
    container_name: documind_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: documind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. The Backend (FastAPI)
  backend:
    build: ./backend
    container_name: documind_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app  # Hot reload enabled for dev
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_SERVER=db
      - DATABASE_URL=postgresql://user:password@db:5432/documind
    depends_on:
      - db

  # 3. The Frontend (React)
  frontend:
    build: ./frontend
    container_name: documind_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173" # Vite default port mapping
    depends_on:
      - backend

volumes:
  postgres_data: